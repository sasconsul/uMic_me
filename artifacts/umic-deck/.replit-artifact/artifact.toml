kind = "slides"
previewPath = "/umic-deck/"
title = "uMic.me Presentation"
version = "1.0.0"
id = "artifacts/umic-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/umic-deck/" ]
localPort = 21686

[services.development]
run = "pnpm --filter @workspace/umic-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/umic-deck", "run", "build" ]
publicDir = "artifacts/umic-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21686"
BASE_PATH = "/umic-deck/"
