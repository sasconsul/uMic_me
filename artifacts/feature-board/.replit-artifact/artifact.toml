kind = "web"
previewPath = "/feature-board/"
title = "uMic.me Feature Board"
version = "1.0.0"
id = "artifacts/feature-board"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/feature-board/" ]
localPort = 20721

[services.development]
run = "pnpm --filter @workspace/feature-board run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/feature-board", "run", "build" ]
publicDir = "artifacts/feature-board/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20721"
BASE_PATH = "/feature-board/"
