openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Live Event Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Events
    description: Event management for hosts.
  - name: Attendees
    description: Attendee join and management.
  - name: CostTracker
    description: Project cost and time tracking.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve a private object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events:
    get:
      tags: [Events]
      operationId: listEvents
      summary: List events for the authenticated host
      responses:
        '200':
          description: List of events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Events]
      operationId: createEvent
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventBody'
      responses:
        '201':
          description: Event created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}:
    get:
      tags: [Events]
      operationId: getEvent
      summary: Get a single event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Event details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [Events]
      operationId: updateEvent
      summary: Update an event (status, title, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventBody'
      responses:
        '200':
          description: Updated event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Events]
      operationId: deleteEvent
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/duplicate:
    post:
      tags: [Events]
      operationId: duplicateEvent
      summary: Duplicate an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DuplicateEventBody'
      responses:
        '201':
          description: Duplicated event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/feedback/{token}:
    post:
      tags: [Events]
      operationId: submitFeedback
      summary: Submit anonymous feedback for an event
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitFeedbackBody'
      responses:
        '201':
          description: Feedback submitted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/feedback:
    get:
      tags: [Events]
      operationId: listFeedback
      summary: List feedback for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Feedback list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackListResponse'

  /events/{id}/attendees:
    get:
      tags: [Attendees]
      operationId: listAttendees
      summary: List attendees for an event (host only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of attendees.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendeeListResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/qr:
    get:
      tags: [Events]
      operationId: getEventQr
      summary: Get QR code image for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: QR code PNG image.
          content:
            image/png:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/stats:
    get:
      tags: [Events]
      operationId: getEventStats
      summary: Get live stats for an event (attendee count, hand-raise count, status)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Event stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventStatsResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /join/{token}:
    post:
      tags: [Attendees]
      operationId: joinEvent
      summary: Join an event as an attendee (public endpoint)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinEventBody'
      responses:
        '200':
          description: Joined successfully — returns attendee record and event info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinEventResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found or closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /attendees/{attendeeId}:
    patch:
      tags: [Attendees]
      operationId: updateAttendee
      summary: Update attendee (raise/lower hand)
      parameters:
        - name: attendeeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAttendeeBody'
      responses:
        '200':
          description: Updated attendee.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendeeResponse'
        '404':
          description: Attendee not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /host/stats:
    get:
      tags: [Events]
      operationId: getHostStats
      summary: Get aggregate stats for the authenticated host (total events, live events, total attendees ever)
      responses:
        '200':
          description: Host dashboard stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostStatsResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost-tracker/projects:
    get:
      tags: [CostTracker]
      operationId: listTrackedProjects
      summary: List all tracked projects
      responses:
        '200':
          description: List of tracked projects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackedProjectListResponse'
    post:
      tags: [CostTracker]
      operationId: createTrackedProject
      summary: Create a new tracked project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTrackedProjectBody'
      responses:
        '201':
          description: Project created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackedProjectResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost-tracker/projects/{id}:
    get:
      tags: [CostTracker]
      operationId: getTrackedProject
      summary: Get a single tracked project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Project details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackedProjectResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [CostTracker]
      operationId: updateTrackedProject
      summary: Update a tracked project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrackedProjectBody'
      responses:
        '200':
          description: Updated project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackedProjectResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [CostTracker]
      operationId: deleteTrackedProject
      summary: Delete a tracked project and all its entries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost-tracker/projects/{projectId}/time-entries:
    get:
      tags: [CostTracker]
      operationId: listTimeEntries
      summary: List time entries for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of time entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeEntryListResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [CostTracker]
      operationId: createTimeEntry
      summary: Log a time entry for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTimeEntryBody'
      responses:
        '201':
          description: Time entry created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeEntryResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost-tracker/projects/{projectId}/time-entries/{id}:
    patch:
      tags: [CostTracker]
      operationId: updateTimeEntry
      summary: Update a time entry
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTimeEntryBody'
      responses:
        '200':
          description: Updated time entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeEntryResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Entry not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [CostTracker]
      operationId: deleteTimeEntry
      summary: Delete a time entry
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'
        '404':
          description: Entry not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost-tracker/projects/{projectId}/expense-entries:
    get:
      tags: [CostTracker]
      operationId: listExpenseEntries
      summary: List expense entries for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of expense entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseEntryListResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [CostTracker]
      operationId: createExpenseEntry
      summary: Log an expense entry for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseEntryBody'
      responses:
        '201':
          description: Expense entry created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseEntryResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost-tracker/projects/{projectId}/expense-entries/{id}:
    patch:
      tags: [CostTracker]
      operationId: updateExpenseEntry
      summary: Update an expense entry
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExpenseEntryBody'
      responses:
        '200':
          description: Updated expense entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseEntryResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Entry not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [CostTracker]
      operationId: deleteExpenseEntry
      summary: Delete an expense entry
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'
        '404':
          description: Entry not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost-tracker/dashboard:
    get:
      tags: [CostTracker]
      operationId: getCostDashboard
      summary: Get per-project and overall cost/time summary
      responses:
        '200':
          description: Dashboard summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostDashboardResponse'

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    DeleteSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    Event:
      type: object
      required: [id, hostUserId, title, status, qrCodeToken, createdAt]
      properties:
        id:
          type: integer
        hostUserId:
          type: string
        title:
          type: string
        logoUrl:
          type: [string, 'null']
        promoText:
          type: [string, 'null']
        startTime:
          type: [string, 'null']
          format: date-time
        status:
          type: string
          enum: [pending, live, closed]
        qrCodeToken:
          type: string
        flyerTagline:
          type: [string, 'null']
        flyerOptions:
          type: [object, 'null']
        createdAt:
          type: string
          format: date-time

    CreateEventBody:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        logoUrl:
          type: [string, 'null']
        promoText:
          type: [string, 'null']
        startTime:
          type: [string, 'null']
          format: date-time
        flyerTagline:
          type: [string, 'null']
        flyerOptions:
          type: [object, 'null']

    UpdateEventBody:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        logoUrl:
          type: [string, 'null']
        promoText:
          type: [string, 'null']
        startTime:
          type: [string, 'null']
          format: date-time
        status:
          type: string
          enum: [pending, live, closed]
        flyerTagline:
          type: [string, 'null']
        flyerOptions:
          type: [object, 'null']

    EventResponse:
      type: object
      required: [event]
      properties:
        event:
          $ref: '#/components/schemas/Event'

    EventListResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'

    Attendee:
      type: object
      required: [id, eventId, assignedId, joinedAt, raisedHand]
      properties:
        id:
          type: integer
        eventId:
          type: integer
        displayName:
          type: [string, 'null']
        assignedId:
          type: integer
        joinedAt:
          type: string
          format: date-time
        raisedHand:
          type: boolean
        raisedHandAt:
          type: [string, 'null']
          format: date-time

    AttendeeResponse:
      type: object
      required: [attendee]
      properties:
        attendee:
          $ref: '#/components/schemas/Attendee'

    AttendeeListResponse:
      type: object
      required: [attendees]
      properties:
        attendees:
          type: array
          items:
            $ref: '#/components/schemas/Attendee'

    JoinEventBody:
      type: object
      properties:
        displayName:
          type: [string, 'null']

    JoinEventResponse:
      type: object
      required: [attendee, event, sessionToken]
      properties:
        attendee:
          $ref: '#/components/schemas/Attendee'
        event:
          $ref: '#/components/schemas/Event'
        sessionToken:
          type: string
          description: Opaque token used to authenticate subsequent attendee requests.

    UpdateAttendeeBody:
      type: object
      properties:
        raisedHand:
